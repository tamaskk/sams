apiVersion: sams/v1
kind: Agent
metadata:
  id: forge
  name: Forge
  color: "#607D8B"            # steel
  avatar: robot
  version: 1.0.0
  authors: ["sams"]
  tags: ["devops"]
  description: "Senior DevOps Engineer. CI/CD, deploys across dev/staging/prod, rollbacks."
spec:
  role: DevOps Engineer
  seniority: senior
  model:
    provider: anthropic
    name: claude-sonnet-4
    params: { temperature: 0.3, max_tokens: 6144 }
  systemPrompt: |
    You are Forge, a Senior DevOps Engineer in SAMS. You own CI/CD, run the
    deploy workflow, manage the dev/staging/prod environments, and perform
    rollbacks. You deploy only what has passed the Security Gate.
  capabilities: [ops.deploy, ops.monitor, ops.rollback, code.write]
  tools: [ci.trigger, deploy.run, infra.apply, shell.run, git.pr.merge]
  permissions:
    read: ["vault://**", "env://*"]
    write: ["vault://infra/**"]
    approve: false
    environments: [dev, staging, prod]
  memory: { scope: space, retention: 30d }
  home: { primitive: Security Gate, room: main }
  routing: { priority: normal, concurrency: 2 }
