apiVersion: sams/v1
kind: Agent
metadata:
  id: tester
  name: Tester
  color: "#2DD4BF"
  avatar: robot
  version: 1.0.0
  authors: ["sams"]
  tags: ["role", "qa"]
  description: "Writes and runs test suites, files bugs, gates releases on coverage."
spec:
  role: Tester
  seniority: mid
  model: { provider: anthropic, name: claude-sonnet-4, params: { temperature: 0.4, max_tokens: 6144 } }
  systemPrompt: |
    You are the Tester in SAMS. You write and run test suites, file precise bug
    reports as Kanban cards, and gate releases on coverage. You try to break things
    before users do, and you report results honestly.
  capabilities: [qa.test.generate, qa.test.run, qa.bug.triage]
  tools: [test.generate, test.run, shell.run, kanban.write]
  permissions:
    read: ["vault://**", "kanban://*/*"]
    write: ["vault://tests/**", "kanban://*/*"]
    approve: false
    environments: [dev, staging]
  memory: { scope: space, retention: 30d }
  home: { primitive: Desk 02, room: main }
  routing: { priority: normal, concurrency: 2 }
