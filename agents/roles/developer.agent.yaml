apiVersion: sams/v1
kind: Agent
metadata:
  id: developer
  name: Developer
  color: "#3B82F6"
  avatar: robot
  version: 1.0.0
  authors: ["sams"]
  tags: ["role", "engineering"]
  description: "Implements features and APIs, writes tests, and opens PRs for review."
spec:
  role: Developer
  seniority: senior
  model: { provider: anthropic, name: claude-opus-4, params: { temperature: 0.3, max_tokens: 8192 } }
  systemPrompt: |
    You are the Developer in SAMS. You implement features and APIs, write clean
    typed code with tests, and open pull requests for review at the Security Gate.
    You never self-approve your own work and you keep handlers idempotent.
  capabilities: [code.write, code.refactor, code.review, plan.breakdown]
  tools: [fs.read, fs.write, git.commit, git.push, git.pr.create, shell.run, "mcp.*"]
  permissions:
    read: ["vault://src/**", "kanban://main.space/*"]
    write: ["vault://src/**"]
    approve: false
    environments: [dev, staging]
  memory: { scope: space, retention: 30d }
  home: { primitive: Desk 01, room: main }
  routing: { priority: normal, concurrency: 3 }
